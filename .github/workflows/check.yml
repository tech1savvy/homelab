name: Check Flake

on:
  push:
    branches: ["main"]
    paths: ["*.nix", ".github/workflows/check.yml"]
  workflow_dispatch:
  pull_request:
    branches: ["main"]

jobs:
  check:
    name: "Check Flake"
    runs-on: "ubuntu-24.04-arm"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"
      - name: "Install Nix"
        uses: "cachix/install-nix-action@v27"
      - name: "Run flake check"
        run: "nix flake check"

