name: Deploy NixOS

on:
  workflow_run:
    workflows: ["Terraform Apply"]
    types: [completed]
    branches: [main]
  push:
    branches:
      - main
    paths:
      - "**/*.nix"
      - "**/*.yaml"
      - ".github/workflows/deploy.yml"
      - "!terraform/**/*.yaml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-24.04
    if: github.event.workflow_run.conclusion == 'success' || github.event_name != 'workflow_run'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Install deploy-rs
        run: nix profile install github:serokell/deploy-rs

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan lab.tech1savvy.me >> ~/.ssh/known_hosts

      - name: Copy age key to server
        run: |
          echo "${{ secrets.SOPS_AGE_KEY }}" > /tmp/age.key
          ssh -o StrictHostKeyChecking=no root@lab.tech1savvy.me "mkdir -p /var/lib/sops && cat > /var/lib/sops/age.key" < /tmp/age.key
          rm /tmp/age.key

      - name: Deploy NixOS
        run: deploy .#lab --hostname lab.tech1savvy.me
